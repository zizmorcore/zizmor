name: shellcheck-multiple-templates
on:
  workflow_dispatch:

permissions: {}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: multiple templates then shell issue
        run: |
          cd $UNQUOTED_DIR
          echo ${{ github.ref }}
          echo ${{ github.actor }}
          if $@; then
            echo "This will cause a shellcheck error due to the unquoted variable."
          fi

