name: dynamic-with-clause
on: push

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.base_ref == main }}

jobs:
  dynamic-with-clause:
    name: dynamic-with-clause
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # zizmor: ignore[artipacked, obfuscation]
        with: ${{ fromJson(steps.setup.outputs.options) }}
