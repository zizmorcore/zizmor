name: precise-trigger-location

permissions: {}

on:
  pull_request_target:
    paths-ignore:
      - "docs/**"
  push:
    paths-ignore:
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: echo "test"
