on: [push]

name: secrets-outside-env

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions: {}
    steps:
      - name: vulnerable-1
        run: echo ${FOO}
        env:
          FOO: ${{ secrets.FOO }}
