on: [push]

name: multiple-secrets

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: vulnerable-1
        run: echo ${NOT_SO_SECRET}
        env:
          NOT_SO_SECRET: ${{ secrets.NOT_SO_SECRET }}

      - name: vulnerable-2
        run: echo ${NOT_SO_SECRET}
        env:
          NOT_SO_SECRET: ${{ secrets.not_so_secret }}

      - name: vulnerable-3
        run: echo ${NOT_SO_SECRET}
        env:
          NOT_SO_SECRET: ${{ secrets['not_so_secret'] }}

      - name: vulnerable-4
        run: echo ${ALSO_NOT_SO_SECRET}
        env:
          ALSO_NOT_SO_SECRET: ${{ secrets.ALSO_NOT_SO_SECRET }}

      - name: not-vulnerable-1
        run: echo ${GITHUB_TOKEN}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: not-vulnerable-2
        run: echo ${github_token}
        env:
          github_token: ${{ secrets.github_token }}

      - name: not-vulnerable-3
        run: echo ${github_token}
        env:
          github_token: ${{ secrets['github_token'] }}
