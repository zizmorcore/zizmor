on: [push]

name: multiple-secrets

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: vulnerable-1
        run: echo ${{ secrets.NOT_SO_SECRET }}

      - name: vulnerable-2
        run: echo ${{ secrets['NOT_SO_SECRET'] }}

      - name: vulnerable-3
        run: echo ${{ secrets.ALSO_NOT_SO_SECRET }}

      - name: not-vulnerable-1
        run: echo ${{ secrets.GITHUB_TOKEN }}

      - name: not-vulnerable-2
        run: echo ${{ secrets.github_token }}

      - name: not-vulnerable-3
        run: echo ${{ secrets['github_token'] }}
